version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 889618000084.dkr.ecr.us-east-1.amazonaws.com
      - REPOSITORY_URI=889618000084.dkr.ecr.us-east-1.amazonaws.com/leadflow
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}

  build:
    commands:
      - echo Build started on $(date)
      - echo Building the Docker image...
      - docker build -t $REPOSITORY_URI:latest .
      - docker tag $REPOSITORY_URI:latest $REPOSITORY_URI:$IMAGE_TAG

  post_build:
    commands:
      - echo Build completed on $(date)
      - echo Pushing the Docker images...
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo Deploying to ECS...
      - aws ecs describe-task-definition --task-definition leadflow-task --region us-east-1 --query taskDefinition --output json > /tmp/task-def.json
      - 'jq ".containerDefinitions[0].image = \"${REPOSITORY_URI}:${IMAGE_TAG}\" | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)" /tmp/task-def.json > /tmp/new-task-def.json'
      - aws ecs register-task-definition --cli-input-json file:///tmp/new-task-def.json --region us-east-1 > /tmp/reg-output.json
      - NEW_REV=$(jq -r '.taskDefinition.revision' /tmp/reg-output.json)
      - echo "New task definition revision $NEW_REV"
      - aws ecs update-service --cluster tryleadflow-prod --service leadflow-task-service --task-definition leadflow-task:$NEW_REV --force-new-deployment --region us-east-1
      - echo ECS deployment triggered

artifacts:
  files: imagedefinitions.json
