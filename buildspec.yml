version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 889618000084.dkr.ecr.us-east-1.amazonaws.com
      - REPOSITORY_URI=889618000084.dkr.ecr.us-east-1.amazonaws.com/leadflow
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}

  build:
    commands:
      - echo Build started on $(date)
      - echo Building the Docker image...
      - docker build -t $REPOSITORY_URI:latest .
      - docker tag $REPOSITORY_URI:latest $REPOSITORY_URI:$IMAGE_TAG

  post_build:
    commands:
      - echo Build completed on $(date)
      - echo Pushing the Docker images...
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo Writing image definitions file...
      - printf '[{"name":"leadflow-container","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json
      - echo Deploying to ECS...
      - aws ecs describe-task-definition --task-definition leadflow-task --region us-east-1 --query taskDefinition > task-def.json
      - |
        python3 << 'EOF'
        import json, os
        with open('task-def.json') as f:
            td = json.load(f)
        td['containerDefinitions'][0]['image'] = os.environ['REPOSITORY_URI'] + ':' + os.environ['IMAGE_TAG']
        for key in ['taskDefinitionArn', 'revision', 'status', 'requiresAttributes', 'compatibilities', 'registeredAt', 'registeredBy']:
            td.pop(key, None)
        with open('new-task-def.json', 'w') as f:
            json.dump(td, f)
        EOF
      - aws ecs register-task-definition --cli-input-json file://new-task-def.json --region us-east-1 > reg-output.json
      - NEW_REV=$(cat reg-output.json | python3 -c "import sys, json; print(json.load(sys.stdin)['taskDefinition']['revision'])")
      - echo "New revision: $NEW_REV"
      - aws ecs update-service --cluster tryleadflow-prod --service leadflow-task-service --task-definition leadflow-task:$NEW_REV --force-new-deployment --region us-east-1
      - echo ECS deployment triggered successfully

artifacts:
  files: imagedefinitions.json
